<html>
<head>
    <title>Data Cleaner Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(255,255,255,0.05);
            --accent: #6366f1;

<body>

<div class="container">

    <div class="card">
        <h2>⚡ Controls</h2>

        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
            <input type="text" id="filePath" placeholder="No file selected" readonly style="flex: 1; padding: 10px; border-radius: 10px; border: none; background: #1e293b; color: white;" />
            <button onclick="chooseFile()" style="padding: 10px 16px;">Choose File</button>
        </div>
        <button onclick="loadFile()">Load File</button>

        <label><input type="checkbox" id="removeNulls"> Remove Nulls</label>
        <label><input type="checkbox" id="dropDuplicates"> Drop Duplicates</label>

        <label>Normalize Columns</label>
        <input type="text" id="textCols" placeholder="col1,col2" />

        <button onclick="cleanData()">Run Cleaning</button>
        <button onclick="exportData()">Export</button>
    </div>

    <div class="card">
        <h2>📊 Preview</h2>
        <div class="table-container" id="tableContainer"></div>
    </div>
    
    <div id="expiryBox" style="margin-top:10px; font-size:12px; color:#94a3b8;">
    ⏳ File expires in: <span id="expiryTimer">--</span>
    </div>

</div>

<script>
const API_BASE = "http://127.0.0.1:5000";

let selectedFilePath = null;     // pywebview desktop path
let selectedFileObject = null;    // browser File object
let currentFileId = null;        // browser uploaded file id
let expiryInterval = null;

function startExpiryTimer(expiryISO) {
    const expiryTime = new Date(expiryISO).getTime();

    if (expiryInterval) clearInterval(expiryInterval);

    function update() {
        const diff = expiryTime - Date.now();

        if (diff <= 0) {
            document.getElementById("expiryTimer").innerText = "Expired";
            clearInterval(expiryInterval);
            return;
        }

        const m = Math.floor(diff / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById("expiryTimer").innerText = `${m}m ${s}s`;
    }

    update();
    expiryInterval = setInterval(update, 1000);
}
function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function renderTable(data) {
    if (!data || data.length === 0) return "No Data";

    let table = "<table><thead><tr>";
    Object.keys(data[0]).forEach(col => {
        table += `<th>${escapeHtml(col)}</th>`;
    });
    table += "</tr></thead><tbody>";

    data.forEach(row => {
        table += "<tr>";
        Object.keys(data[0]).forEach(col => {
            table += `<td>${escapeHtml(row[col])}</td>`;
        });
        table += "</tr>";
    });

    table += "</tbody></table>";
    return table;
}

function hasPyWebView() {
    return !!(window.pywebview && window.pywebview.api);
}

async function getPyWebViewApi(timeoutMs = 1500) {
    if (typeof window.pywebview === "undefined") return null;

    const start = Date.now();
    while (Date.now() - start < timeoutMs) {
        if (window.pywebview && window.pywebview.api) {
            return window.pywebview.api;
        }
        await new Promise(resolve => setTimeout(resolve, 50));
    }
    return null;
}

async function readJsonResponse(res) {
    const text = await res.text();
    try {
        return JSON.parse(text);
    } catch {
        throw new Error(text);
    }
}

async function chooseFile() {
    try {
        const api = await getPyWebViewApi();

        if (api && typeof api.open_file_dialog === "function") {
            const path = await api.open_file_dialog();
            if (!path) return;

            selectedFilePath = path;
            selectedFileObject = null;
            currentFileId = null;
            document.getElementById("filePath").value = path;
            return;
        }

        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".csv,.xlsx,.xls";

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            selectedFileObject = file;
            selectedFilePath = null;
            currentFileId = null;
            document.getElementById("filePath").value = file.name;
        };

        input.click();
    } catch (err) {
        alert("Error selecting file: " + err);
    }
}

async function loadFile() {
    try {
        const api = await getPyWebViewApi();

        // Desktop mode
        if (api && typeof selectedFilePath === "string") {
            const result = await api.load_file(selectedFilePath);

            if (result.error) {
                alert(result.error);
                return;
            }

            currentFileId = null;
            document.getElementById("tableContainer").innerHTML = renderTable(result.preview);
            return;
        }

        // Browser mode
        if (!(selectedFileObject instanceof File)) {
            alert("Select file first");
            return;
        }

        const formData = new FormData();
        formData.append("file", selectedFileObject);

        const res = await fetch(`${API_BASE}/load-file`, {
            method: "POST",
            body: formData
        });

        const result = await readJsonResponse(res);

        if (!res.ok || result.error) {
            alert(result.error || "Upload failed");
            return;
        }

        currentFileId = result.file_id;
        document.getElementById("tableContainer").innerHTML = renderTable(result.preview);
    } catch (err) {
        alert("Error: " + err);
    }
}

async function cleanData() {
    try {
        const config = {
            remove_nulls: document.getElementById("removeNulls").checked,
            drop_duplicates: document.getElementById("dropDuplicates").checked,
            normalize_text: document.getElementById("textCols").value
                .split(",")
                .map(x => x.trim())
                .filter(x => x)
        };

        const api = await getPyWebViewApi();

        // Desktop mode
        if (api && typeof selectedFilePath === "string") {
            const result = await api.clean_data(JSON.stringify(config));

            if (result.error) {
                alert(result.error);
                return;
            }

            document.getElementById("tableContainer").innerHTML = renderTable(result.preview);
            return;
        }

        // Browser mode
        if (!currentFileId) {
            alert("Load file first");
            return;
        }

        const res = await fetch(`${API_BASE}/clean-data`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                file_id: currentFileId,
                config: config
            })
        });

        const result = await readJsonResponse(res);

        if (!res.ok || result.error) {
            alert(result.error || "Cleaning failed");
            return;
        }

        currentFileId = result.file_id;
        document.getElementById("tableContainer").innerHTML = renderTable(result.preview);
    } catch (err) {
        alert("Error: " + err);
    }
}

async function exportData() {
    try {
        const api = await getPyWebViewApi();

        // Desktop mode
        if (api && typeof selectedFilePath === "string") {
            const path = await api.save_file_dialog("output.csv");
            if (!path) return;

            const result = await api.export_file(path);

            if (result.error) {
                alert(result.error);
            } else {
                alert("Export successful: " + path);
            }
            return;
        }

        // Browser mode
        if (!currentFileId) {
            alert("Load file first");
            return;
        }

        window.open(`${API_BASE}/export-file/${currentFileId}`, "_blank");
    } catch (err) {
        alert("Error exporting file: " + err);
    }
}
</script>

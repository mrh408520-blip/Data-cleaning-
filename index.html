<!DOCTYPE html>
<html>
<head>
    <title>Data Cleaner Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(255,255,255,0.05);
            --accent: #6366f1;
            --accent2: #22c55e;
            --text: #e5e7eb;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: var(--text);
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 { margin-top: 0; }

        button {
            background: linear-gradient(45deg, var(--accent), var(--accent2));
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin-top: 8px;
            background: #1e293b;
            color: white;
        }

        label { display: block; margin-top: 10px; }

        table {
            width: auto;
            min-width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            padding: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            position: sticky;
            top: 0;
            background: #020617;
        }

        .table-container {
            width: 100%;
            max-width: 100%;
            max-height: 500px;
            height: 500px;
            overflow: auto;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <h2>⚡ Controls</h2>

        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
            <input type="text" id="filePath" placeholder="No file selected" readonly style="flex: 1; padding: 10px; border-radius: 10px; border: none; background: #1e293b; color: white;" />
            <button onclick="chooseFile()" style="padding: 10px 16px;">Choose File</button>
        </div>
        <button onclick="loadFile()">Load File</button>

        <label><input type="checkbox" id="removeNulls"> Remove Nulls</label>
        <label><input type="checkbox" id="dropDuplicates"> Drop Duplicates</label>

        <label>Normalize Columns</label>
        <input type="text" id="textCols" placeholder="col1,col2" />

        <button onclick="cleanData()">Run Cleaning</button>
        <button onclick="exportData()">Export</button>
    </div>

    <div class="card">
        <h2>📊 Preview</h2>
        <div class="table-container" id="tableContainer"></div>
    </div>

</div>

<script>
const API_BASE = "http://localhost:5000";

// detect environment
const isPyWebView = typeof window.pywebview !== "undefined";
// ================= GLOBAL STATE (MUST BE FIRST) =================
let selectedFilePath = null;
let TABLE_COLUMNS = null;

// ================= RENDER FUNCTION =================
function renderTable(data) {
    if (!data || data.length === 0) return "No Data";

    if (!TABLE_COLUMNS) {
        TABLE_COLUMNS = Object.keys(data[0]);
    }

    let table = "<table><thead><tr>";

    TABLE_COLUMNS.forEach(col => {
        table += `<th>${col}</th>`;
    });

    table += "</tr></thead><tbody>";

    data.forEach(row => {
        table += "<tr>";

        TABLE_COLUMNS.forEach(col => {
            table += `<td>${row[col] ?? ""}</td>`;
        });

        table += "</tr>";
    });

    table += "</tbody></table>";

    return table;
}
async function chooseFile() {

    if (isPyWebView) {
        // 🖥 Desktop mode
        try {
            const path = await window.pywebview.api.open_file_dialog();

            if (!path) return;

            selectedFilePath = path;
            document.getElementById("filePath").value = path;

        } catch (err) {
            alert("PyWebView Error: " + err);
        }

    } else {
        // 🌐 Browser mode
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".csv,.xlsx,.xls";

        input.onchange = (e) => {
            selectedFile = e.target.files[0];
            document.getElementById("filePath").value = selectedFile.name;
        };

        input.click();
    }
}

async function loadFile() {

    try {

        if (isPyWebView) {

            const result = await window.pywebview.api.load_file(selectedFilePath);

            if (result.error) return alert(result.error);

            document.getElementById("tableContainer").innerHTML =
                renderTable(result.preview);

        } else {

            const formData = new FormData();
            formData.append("file", selectedFile);

            const res = await fetch(`${API_BASE}/upload`, {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            if (data.error) return alert(data.error);

            window.fileId = data.file_id;

            document.getElementById("tableContainer").innerHTML =
                renderTable(data.preview);
        }

    } catch (err) {
        alert("Load error: " + err);
    }
}
async function cleanData() {

    const config = {
        remove_nulls: document.getElementById("removeNulls").checked,
        drop_duplicates: document.getElementById("dropDuplicates").checked,
        normalize_text: document.getElementById("textCols")
            .value.split(",").map(x => x.trim()).filter(Boolean)
    };

    try {

        if (isPyWebView) {

            const result = await window.pywebview.api.clean_data(JSON.stringify(config));

            if (result.error) return alert(result.error);

            document.getElementById("tableContainer").innerHTML =
                renderTable(result.preview);

        } else {

            const res = await fetch(`${API_BASE}/clean/${window.fileId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(config)
            });

            const data = await res.json();

            if (data.error) return alert(data.error);

            window.fileId = data.file_id;

            document.getElementById("tableContainer").innerHTML =
                renderTable(data.preview);
        }

    } catch (err) {
        alert("Clean error: " + err);
    }
}
async function exportData() {

    try {

        if (isPyWebView) {

            const path = await window.pywebview.api.save_file_dialog("output.csv");
            if (!path) return;

            await window.pywebview.api.export_file(path);
            alert("Export successful");

        } else {

            window.open(`${API_BASE}/download/${window.fileId}`, "_blank");
        }

    } catch (err) {
        alert("Export error: " + err);
    }
}
</script>

</body>
</html>
